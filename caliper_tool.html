<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHAHE Caliper Tool</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #141b23;
      --panel-2: #1b2430;
      --text: #e8edf3;
      --muted: #9aa7b5;
      --accent: #4ea1ff;
      --accent-hover: #78b8ff;
      --danger: #ff6b6b;
      --danger-hover: #ff8a8a;
      --success: #3ddc97;
      --border: #2a3442;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #121923 0%, var(--bg) 45%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(760px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)), var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      min-width: 140px;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #connectButton {
      background: var(--accent);
      color: white;
    }

    #connectButton:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    #disconnectButton {
      background: var(--danger);
      color: white;
    }

    #disconnectButton:hover:not(:disabled) {
      background: var(--danger-hover);
    }

    .measurement-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      margin-bottom: 18px;
    }

    .label {
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .reading {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    .unit {
      color: var(--success);
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 700;
      margin-top: 10px;
    }

    .statusbar {
      min-height: 58px;
      background: #0f151d;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      color: var(--muted);
      display: flex;
      align-items: center;
      font-size: 0.98rem;
      line-height: 1.4;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <button id="connectButton" type="button">Connect</button>
      <button id="disconnectButton" type="button" disabled>Disconnect</button>
    </div>

    <section class="measurement-card" aria-live="polite">
      <div class="label">Caliper Measurement</div>
      <div id="measurementValue" class="reading">--</div>
      <div class="unit">mm</div>
    </section>

    <div id="statusBar" class="statusbar">Ready.</div>
  </main>

  <script>
    const ADVERTISED_SERVICE_UUID = '0000180a-0000-1000-8000-00805f9b34fb';
    const PRIMARY_SERVICE_UUID = '0000ffff-0000-1000-8000-00805f9b34fb';
    const CHARACTERISTIC_UUID = '0000ff00-0000-1000-8000-00805f9b34fb';

    const connectButton = document.getElementById('connectButton');
    const disconnectButton = document.getElementById('disconnectButton');
    const measurementValue = document.getElementById('measurementValue');
    const statusBar = document.getElementById('statusBar');

    let bluetoothDevice = null;
    let gattServer = null;
    let service = null;
    let characteristic = null;

    function setStatus(message) {
      statusBar.textContent = message;
    }

    function setConnectedUi(connected) {
      connectButton.disabled = connected;
      disconnectButton.disabled = !connected;
    }

    function formatMeasurement(value) {
      return value.toFixed(2);
    }

    function hexBytesToReal(bytes) {
      const raw = (bytes[4] * 0x1000000) + (bytes[5] << 16) + (bytes[6] << 8) + bytes[7];

      if (bytes[7] === 0x01) {
        return -((raw - 1) / 25600);
      }

      return raw / 25600;
    }

    function handleBleNotifications(event) {
      const value = event.target.value;
      const bytes = new Uint8Array(value.buffer.slice(value.byteOffset, value.byteOffset + value.byteLength));

      if (bytes.length !== 8) {
        setStatus(`Received unexpected payload length: ${bytes.length} bytes.`);
        return;
      }

      const measurement = hexBytesToReal(bytes);
      measurementValue.textContent = formatMeasurement(measurement);
      // setStatus(`Packet bytes: ${Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join(' ')}`);

      const now = new Date();
      const timestamp = now.toLocaleTimeString();
      setStatus(`Measured at time: ${timestamp}`);
    }

    async function requestDevice() {
      setStatus('Requesting Bluetooth device...');

      bluetoothDevice = await navigator.bluetooth.requestDevice({
        filters: [{ services: [ADVERTISED_SERVICE_UUID] }],
        optionalServices: [PRIMARY_SERVICE_UUID],
      });

      bluetoothDevice.addEventListener('gattserverdisconnected', onGattServerDisconnected);
      setStatus(`Device selected: ${bluetoothDevice.name || 'Unnamed device'}`);
    }

    async function connectDeviceAndCacheCharacteristics() {
      if (!bluetoothDevice) {
        throw new Error('No Bluetooth device selected.');
      }

      setStatus('Connecting...');
      gattServer = await bluetoothDevice.gatt.connect();

      setStatus('Getting primary service...');
      service = await gattServer.getPrimaryService(PRIMARY_SERVICE_UUID);

      setStatus('Getting characteristic...');
      characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

      setStatus('Starting notifications...');
      await characteristic.startNotifications();
      characteristic.addEventListener('characteristicvaluechanged', handleBleNotifications);

      setConnectedUi(true);
      setStatus('Connected and listening for measurements.');
    }

    async function disconnectDevice() {
      try {
        setStatus('Disconnecting...');

        if (characteristic) {
          characteristic.removeEventListener('characteristicvaluechanged', handleBleNotifications);
          try {
            await characteristic.stopNotifications();
          } catch (error) {
            // Some devices may already be disconnected; ignore stop notification failures.
          }
        }

        if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
          bluetoothDevice.gatt.disconnect();
        }
      } finally {
        characteristic = null;
        service = null;
        gattServer = null;
        setConnectedUi(false);
        setStatus('Disconnected.');
      }
    }

    function onGattServerDisconnected() {
      if (characteristic) {
        characteristic.removeEventListener('characteristicvaluechanged', handleBleNotifications);
      }
      characteristic = null;
      service = null;
      gattServer = null;
      setConnectedUi(false);
      setStatus('Device disconnected.');
    }

    connectButton.addEventListener('click', async () => {
      if (!navigator.bluetooth) {
        setStatus('Web Bluetooth is not supported in this browser. Use a compatible Chromium-based browser.');
        return;
      }

      try {
        await requestDevice();
        await connectDeviceAndCacheCharacteristics();
      } catch (error) {
        console.error(error);
        setConnectedUi(false);
        setStatus(`Error: ${error.message}`);
      }
    });

    disconnectButton.addEventListener('click', async () => {
      try {
        await disconnectDevice();
      } catch (error) {
        console.error(error);
        setStatus(`Disconnect error: ${error.message}`);
      }
    });
  </script>
</body>
</html>
